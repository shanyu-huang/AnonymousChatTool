<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { overscroll-behavior: none; }
    #chat-screen { position: fixed; top: 0; left: 0; width: 100%; overflow: hidden; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .msg-bubble { max-width: 80vw; word-wrap: break-word; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col select-none">

  <!-- ==================== AUTH SCREEN ==================== -->
  <div id="auth-screen" class="flex flex-col items-center justify-center h-full p-6">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">匿名聊天室</h1>
      <p class="text-sm text-gray-500 text-center mb-6">Session: <strong id="auth-sid"></strong></p>

      <label class="block text-sm font-medium text-gray-700 mb-1">設定您的密碼</label>
      <p class="text-xs text-gray-400 mb-2">請自行設定一組只有您知道的密碼。進入聊天室後，可將此密碼告知研究者，以確認您的身分。</p>
      <div class="relative mb-4">
        <input id="passcode-input" type="password" placeholder="自行輸入任意密碼"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-green-400"
          onkeydown="if(event.key==='Enter') handleAuth()">
        <button type="button" onclick="toggleAuthPasscode()"
          class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 px-1 text-sm"
          id="auth-toggle-btn" title="顯示/隱藏密碼">👁</button>
      </div>

      <button id="auth-btn" onclick="handleAuth()"
        class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition">
        進入聊天室
      </button>

      <p class="text-xs text-gray-400 mt-4 text-center leading-relaxed">
        此對話將與您目前的裝置綁定。<br>
        請勿更換裝置或清除瀏覽器快取，以免失去存取權。
      </p>
    </div>
  </div>

  <!-- ==================== CHAT SCREEN ==================== -->
  <div id="chat-screen" class="hidden flex flex-col">
    <!-- Header -->
    <div class="bg-green-500 text-white px-4 py-3 flex items-center justify-between shadow-sm flex-shrink-0">
      <div>
        <span class="font-semibold">Anonymous Chat</span>
        <span class="text-green-100 text-sm ml-2" id="display-sid"></span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="togglePasscode()" id="passcode-btn"
          class="text-green-100 hover:text-white text-xs px-2 py-1 rounded transition" title="顯示/隱藏密碼">🔑</button>
        <span id="passcode-display" class="hidden text-xs text-green-100 font-mono bg-green-600 px-2 py-0.5 rounded"></span>
        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-green-300" title="Connected"></div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-2 bg-gray-50">
      <!-- Messages rendered here -->
    </div>

    <!-- Input bar -->
    <div class="bg-white border-t border-gray-200 px-3 py-2 flex gap-2 items-end flex-shrink-0">
      <textarea id="msg-input" rows="1" placeholder="Type a message..."
        class="flex-1 border border-gray-300 rounded-2xl px-4 py-2 resize-none focus:outline-none focus:ring-2 focus:ring-green-400 text-sm"
        onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="handleSend()"
        class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-2xl transition flex-shrink-0 text-sm font-medium">
        Send
      </button>
    </div>
  </div>

  <!-- ==================== ALERT OVERLAY ==================== -->
  <div id="alert-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm">
      <p id="alert-message" class="text-gray-800 text-sm leading-relaxed"></p>
      <button onclick="closeAlert()"
        class="mt-4 w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 rounded-lg transition">
        OK
      </button>
    </div>
  </div>

  <!-- ==================== LOADING OVERLAY ==================== -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 flex items-center gap-3">
      <div class="spinner border-green-500 border-t-transparent"></div>
      <span class="text-gray-600 text-sm">Connecting...</span>
    </div>
  </div>

<script>
// ==================== CONSTANTS ====================
const PID = '<?!= pid ?>';
const SID = '<?!= sid ?>';
const STORAGE_KEY = 'chat_' + PID + '_' + SID;
const POLL_INTERVAL = 1000;

// ==================== STATE ====================
let state = null;
let pollingTimer = null;
let lastTimestamp = '';
let sendQueue = [];
let isSending = false;
let isPolling = false;
let renderedTimestamps = new Set();

// ==================== INITIALIZATION ====================
document.addEventListener('DOMContentLoaded', init);

function init() {
  document.getElementById('auth-sid').textContent = SID;
  state = loadState();
  if (state && state.passcode && state.clientId) {
    showLoading(true);
    // Verify stored credentials still work
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          enterChat();
        } else {
          // Credentials invalid — re-authenticate
          clearState();
          state = null;
          showScreen('auth-screen');
          if (result.error && result.error.indexOf('Access Denied') !== -1) {
            showAlert(result.error);
          }
        }
      })
      .withFailureHandler(function() {
        showLoading(false);
        showScreen('auth-screen');
      })
      .authenticate({ pid: PID, sid: SID, passcode: state.passcode, clientId: state.clientId });
  } else {
    showScreen('auth-screen');
  }
}

// ==================== STATE MANAGEMENT ====================
function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function saveState(passcode, clientId) {
  state = { passcode: passcode, clientId: clientId, role: 'client' };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
}

function generateClientId() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxx-xxxx-xxxx-xxxx'.replace(/x/g, function() {
    return Math.floor(Math.random() * 16).toString(16);
  });
}

// ==================== AUTH ====================
function handleAuth() {
  var passcode = document.getElementById('passcode-input').value.trim();

  if (!passcode) {
    showAlert('Please enter a passcode.');
    return;
  }

  var clientId = generateClientId();
  var btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.textContent = '進入聊天室';
      if (result.success) {
        saveState(passcode, clientId);
        enterChat();
      } else {
        showAlert(result.error || 'Authentication failed.');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = '進入聊天室';
      showAlert('Connection error. Please try again.');
    })
    .authenticate({ pid: PID, sid: SID, passcode: passcode, clientId: clientId });
}

function enterChat() {
  document.getElementById('display-sid').textContent = SID;
  showScreen('chat-screen');
  fitChatScreen();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitChatScreen);
  }
  fetchAllMessages();
  startPolling();
  document.getElementById('msg-input').focus();
}

function fitChatScreen() {
  var el = document.getElementById('chat-screen');
  var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  var y = window.visualViewport ? window.visualViewport.offsetTop : 0;
  el.style.height = h + 'px';
  el.style.top = y + 'px';
}

// ==================== MESSAGING ====================
function handleSend() {
  var input = document.getElementById('msg-input');
  var content = input.value.trim();
  if (!content || !state) return;

  input.value = '';
  autoResize(input);
  input.focus(); // keep keyboard open on mobile

  sendQueue.push(content);
  processSendQueue();
}

function processSendQueue() {
  if (isSending || sendQueue.length === 0) return;
  isSending = true;
  var content = sendQueue.shift();

  google.script.run
    .withSuccessHandler(function(result) {
      isSending = false;
      if (result.success) {
        renderedTimestamps.add(result.timestamp);
        if (result.timestamp > lastTimestamp) lastTimestamp = result.timestamp;
      } else {
        showAlert(result.error || 'Failed to send message.');
      }
      processSendQueue();
    })
    .withFailureHandler(function() {
      isSending = false;
      showAlert('Failed to send. Please try again.');
      processSendQueue();
    })
    .sendMessage({
      pid: PID, sid: SID,
      passcode: state.passcode, clientId: state.clientId,
      role: state.role, content: content
    });
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ==================== POLLING ====================
function startPolling() {
  stopPolling();
  pollingTimer = setInterval(fetchNewMessages, POLL_INTERVAL);
}

function stopPolling() {
  if (pollingTimer) {
    clearInterval(pollingTimer);
    pollingTimer = null;
  }
}

function fetchAllMessages() {
  if (!state) return;
  google.script.run
    .withSuccessHandler(function(result) {
      if (result.success) {
        renderAllMessages(result.messages);
      } else {
        handleFetchError(result.error);
      }
    })
    .withFailureHandler(function() {})
    .fetchMessages({
      pid: PID, sid: SID,
      passcode: state.passcode, clientId: state.clientId,
      since: ''
    });
}

function fetchNewMessages() {
  if (!state || isPolling) return;
  isPolling = true;

  google.script.run
    .withSuccessHandler(function(result) {
      isPolling = false;
      if (result.success && result.messages.length > 0) {
        renderNewMessages(result.messages);
      } else if (!result.success) {
        handleFetchError(result.error);
      }
    })
    .withFailureHandler(function() {
      isPolling = false;
    })
    .fetchMessages({
      pid: PID, sid: SID,
      passcode: state.passcode, clientId: state.clientId,
      since: lastTimestamp
    });
}

function handleFetchError(error) {
  if (error && error.indexOf('Access Denied') !== -1) {
    stopPolling();
    clearState();
    showAlert(error + '\n\nYou will be redirected to the login screen.');
  }
}

// ==================== RENDERING ====================
function renderAllMessages(messages) {
  var container = document.getElementById('messages');
  container.innerHTML = '';
  lastTimestamp = '';
  renderedTimestamps = new Set();
  for (var i = 0; i < messages.length; i++) {
    renderMessage(messages[i], false);
  }
  scrollToBottom();
}

function renderNewMessages(messages) {
  var shouldScroll = isNearBottom();
  for (var i = 0; i < messages.length; i++) {
    renderMessage(messages[i], false);
  }
  if (shouldScroll) scrollToBottom();
}

function renderMessage(msg, isOptimistic) {
  if (!isOptimistic && msg.timestamp) {
    if (renderedTimestamps.has(msg.timestamp)) return; // skip dedup
    renderedTimestamps.add(msg.timestamp);
    if (msg.timestamp > lastTimestamp) lastTimestamp = msg.timestamp;
  }

  var container = document.getElementById('messages');
  var isOwn = state && msg.role === state.role;

  var wrapper = document.createElement('div');
  wrapper.className = 'flex ' + (isOwn ? 'justify-end' : 'justify-start');

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble rounded-2xl px-4 py-2 text-sm shadow-sm ' +
    (isOwn
      ? 'bg-green-500 text-white rounded-br-sm'
      : 'bg-white text-gray-800 rounded-bl-sm border border-gray-100');

  bubble.textContent = msg.content; // textContent is XSS-safe

  var time = document.createElement('div');
  time.className = 'text-xs mt-0.5 ' + (isOwn ? 'text-right text-green-100' : 'text-left text-gray-400');
  time.textContent = formatTime(msg.timestamp);

  if (isOwn) {
    var inner = document.createElement('div');
    inner.appendChild(bubble);
    inner.appendChild(time);
    wrapper.appendChild(inner);
  } else {
    var roleTag = document.createElement('div');
    roleTag.className = 'text-xs text-gray-400 mb-0.5 ml-1';
    roleTag.textContent = msg.role;
    var inner = document.createElement('div');
    inner.appendChild(roleTag);
    inner.appendChild(bubble);
    inner.appendChild(time);
    wrapper.appendChild(inner);
  }

  // Avoid duplicate optimistic messages — polling will replace them naturally
  container.appendChild(wrapper);
}

function formatTime(isoStr) {
  try {
    var d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    return '';
  }
}

// ==================== UI HELPERS ====================
function showScreen(id) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function showAlert(msg) {
  document.getElementById('alert-message').textContent = msg;
  document.getElementById('alert-overlay').classList.remove('hidden');
}

function closeAlert() {
  document.getElementById('alert-overlay').classList.add('hidden');
}

function showLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !show);
}

function scrollToBottom() {
  var el = document.getElementById('messages');
  setTimeout(function() { el.scrollTop = el.scrollHeight; }, 50);
}

function isNearBottom() {
  var el = document.getElementById('messages');
  return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
}

function toggleAuthPasscode() {
  var input = document.getElementById('passcode-input');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function togglePasscode() {
  var display = document.getElementById('passcode-display');
  if (display.classList.contains('hidden')) {
    display.textContent = state ? state.passcode : '';
    display.classList.remove('hidden');
  } else {
    display.classList.add('hidden');
  }
}
</script>
</body>
</html>
